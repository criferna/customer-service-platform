# =============================================================================
# RabbitMQ Configuration - Customer Service Platform
# =============================================================================
# Configuración del Message Broker que actúa como Event Bus.
#
# PATRÓN: Event-Driven Architecture
#   Los microservicios se comunican de forma asíncrona a través de eventos.
#   Un servicio publica un evento (ej: ticket.created) y otros servicios
#   interesados lo consumen sin que el productor los conozca (desacoplamiento).
#
# PATRÓN: Consistencia Eventual
#   Los datos entre servicios no se sincronizan instantáneamente.
#   Un evento viaja por RabbitMQ y los consumidores actualizan su estado local.
#   Esto permite autonomía y resiliencia a costa de consistencia inmediata.
# =============================================================================

# Cargar definiciones pre-configuradas al iniciar (exchanges, queues, bindings)
management.load_definitions = /etc/rabbitmq/definitions.json

# Logging
log.console = true
log.console.level = info

# Límites de memoria (ajustado para lab con recursos compartidos)
vm_memory_high_watermark.relative = 0.4

# Heartbeat para detectar conexiones muertas
heartbeat = 30
